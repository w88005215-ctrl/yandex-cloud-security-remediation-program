apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: ycsec-kubernetes-baseline-controls
  labels:
    app.kubernetes.io/part-of: yandex-cloud-security-remediation-program
    security.ycsec.io/phase: phase-12-remediation
spec:
  validationFailureAction: Audit
  background: true
  rules:
    - name: require-run-as-non-root
      match:
        any:
          - resources:
              kinds:
                - Pod
      validate:
        message: Pods should run as non-root.
        pattern:
          spec:
            securityContext:
              runAsNonRoot: true
    - name: disallow-privilege-escalation
      match:
        any:
          - resources:
              kinds:
                - Pod
      validate:
        message: Containers must disable privilege escalation.
        pattern:
          spec:
            containers:
              - securityContext:
                  allowPrivilegeEscalation: false
    - name: require-runtime-default-seccomp
      match:
        any:
          - resources:
              kinds:
                - Pod
      validate:
        message: Pods should use RuntimeDefault seccomp profile.
        pattern:
          spec:
            securityContext:
              seccompProfile:
                type: RuntimeDefault
    - name: require-drop-all-capabilities
      match:
        any:
          - resources:
              kinds:
                - Pod
      validate:
        message: Containers should drop all Linux capabilities.
        pattern:
          spec:
            containers:
              - securityContext:
                  capabilities:
                    drop:
                      - ALL
    - name: require-resource-requests-limits
      match:
        any:
          - resources:
              kinds:
                - Pod
      validate:
        message: Containers should define CPU and memory requests and limits.
        pattern:
          spec:
            containers:
              - resources:
                  requests:
                    cpu: "?*"
                    memory: "?*"
                  limits:
                    cpu: "?*"
                    memory: "?*"

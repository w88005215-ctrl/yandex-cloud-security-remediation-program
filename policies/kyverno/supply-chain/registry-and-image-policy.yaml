apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: ycsec-supply-chain-registry-policy
  annotations:
    policies.kyverno.io/title: YCSEC Registry and Image Supply Chain Policy
    policies.kyverno.io/category: Supply Chain Security
    policies.kyverno.io/severity: high
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: require-yandex-container-registry
      match:
        any:
          - resources:
              kinds:
                - Pod
      validate:
        message: "Images must be pulled from the approved Yandex Container Registry namespace."
        pattern:
          spec:
            containers:
              - image: "cr.yandex/*"

    - name: disallow-latest-tag
      match:
        any:
          - resources:
              kinds:
                - Pod
      validate:
        message: "Mutable latest image tag is not allowed."
        deny:
          conditions:
            any:
              - key: "{{ request.object.spec.containers[].image[] }}"
                operator: AnyIn
                value:
                  - "*:latest"

    - name: require-non-root-container
      match:
        any:
          - resources:
              kinds:
                - Pod
      validate:
        message: "Containers must run as non-root."
        pattern:
          spec:
            containers:
              - securityContext:
                  runAsNonRoot: true

    - name: require-read-only-root-filesystem
      match:
        any:
          - resources:
              kinds:
                - Pod
      validate:
        message: "Containers must use readOnlyRootFilesystem."
        pattern:
          spec:
            containers:
              - securityContext:
                  readOnlyRootFilesystem: true

    - name: disallow-privilege-escalation
      match:
        any:
          - resources:
              kinds:
                - Pod
      validate:
        message: "Privilege escalation must be disabled."
        pattern:
          spec:
            containers:
              - securityContext:
                  allowPrivilegeEscalation: false

name: YCSEC Supply Chain OIDC Registry Validation

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  build-push-validate:
    name: Build and push demo images to Yandex Container Registry
    runs-on: ubuntu-latest

    env:
      YCSEC_YC_SA_ID: ${{ vars.YCSEC_YC_SA_ID }}
      YCSEC_YC_FOLDER_ID: ${{ vars.YCSEC_YC_FOLDER_ID }}
      YCSEC_YCR_REGISTRY_ID: ${{ vars.YCSEC_YCR_REGISTRY_ID }}
      IMAGE_REPOSITORY: ycsec-supply-chain-demo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate required variables
        shell: bash
        run: |
          set -euo pipefail
          test -n "${YCSEC_YC_SA_ID}"
          test -n "${YCSEC_YC_FOLDER_ID}"
          test -n "${YCSEC_YCR_REGISTRY_ID}"
          echo "[OK] required GitHub repository variables are present"

      - name: Request GitHub OIDC ID token
        id: github_oidc
        shell: bash
        run: |
          set -euo pipefail
          OIDC_RESPONSE="$(curl -sSf \
            -H "Authorization: bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=https://github.com/${GITHUB_REPOSITORY_OWNER}")"
          ID_TOKEN="$(echo "${OIDC_RESPONSE}" | jq -r '.value')"
          test -n "${ID_TOKEN}"
          echo "::add-mask::${ID_TOKEN}"
          echo "id_token=${ID_TOKEN}" >> "${GITHUB_OUTPUT}"
          echo "[OK] GitHub OIDC ID token received"

      - name: Exchange GitHub OIDC token for Yandex Cloud IAM token
        id: yc_token
        shell: bash
        run: |
          set -euo pipefail
          TOKEN_RESPONSE="$(curl -sSf -X POST "https://auth.yandex.cloud/oauth/token" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            --data-urlencode "grant_type=urn:ietf:params:oauth:grant-type:token-exchange" \
            --data-urlencode "requested_token_type=urn:ietf:params:oauth:token-type:access_token" \
            --data-urlencode "audience=${YCSEC_YC_SA_ID}" \
            --data-urlencode "subject_token=${{ steps.github_oidc.outputs.id_token }}" \
            --data-urlencode "subject_token_type=urn:ietf:params:oauth:token-type:id_token")"
          IAM_TOKEN="$(echo "${TOKEN_RESPONSE}" | jq -r '.access_token')"
          test -n "${IAM_TOKEN}"
          echo "::add-mask::${IAM_TOKEN}"
          echo "iam_token=${IAM_TOKEN}" >> "${GITHUB_OUTPUT}"
          echo "[OK] Yandex Cloud IAM token received via OIDC token exchange"

      - name: Validate Yandex Cloud folder API access
        shell: bash
        run: |
          set -euo pipefail
          FOLDER_ID="$(curl -sSf \
            -H "Authorization: Bearer ${{ steps.yc_token.outputs.iam_token }}" \
            "https://resource-manager.api.cloud.yandex.net/resource-manager/v1/folders/${YCSEC_YC_FOLDER_ID}" \
            | jq -r '.id')"
          test "${FOLDER_ID}" = "${YCSEC_YC_FOLDER_ID}"
          echo "[OK] federated IAM token can access Yandex Cloud Resource Manager API"

      - name: Login to Yandex Container Registry
        shell: bash
        run: |
          set -euo pipefail
          echo "${{ steps.yc_token.outputs.iam_token }}" | docker login --username iam --password-stdin cr.yandex
          echo "[OK] docker login to Yandex Container Registry completed with federated IAM token"

      - name: Build controlled demo images
        shell: bash
        run: |
          set -euo pipefail
          INSECURE_IMAGE="cr.yandex/${YCSEC_YCR_REGISTRY_ID}/${IMAGE_REPOSITORY}:insecure-${GITHUB_SHA}"
          HARDENED_IMAGE="cr.yandex/${YCSEC_YCR_REGISTRY_ID}/${IMAGE_REPOSITORY}:hardened-${GITHUB_SHA}"

          docker build \
            -f supply-chain/demo-app/Dockerfile.insecure \
            -t "${INSECURE_IMAGE}" \
            supply-chain/demo-app

          docker build \
            -f supply-chain/demo-app/Dockerfile.hardened \
            -t "${HARDENED_IMAGE}" \
            supply-chain/demo-app

          echo "INSECURE_IMAGE=${INSECURE_IMAGE}" >> "${GITHUB_ENV}"
          echo "HARDENED_IMAGE=${HARDENED_IMAGE}" >> "${GITHUB_ENV}"
          echo "[OK] controlled demo images built"

      - name: Push controlled demo images
        shell: bash
        run: |
          set -euo pipefail
          docker push "${INSECURE_IMAGE}"
          docker push "${HARDENED_IMAGE}"
          echo "[OK] controlled demo images pushed to Yandex Container Registry"

      - name: Confirm no long-lived cloud key material was used
        shell: bash
        run: |
          set -euo pipefail
          test ! -f authorized_key.json
          test ! -f service_account_key.json
          test ! -f key.json
          echo "[OK] no long-lived cloud key material was used"

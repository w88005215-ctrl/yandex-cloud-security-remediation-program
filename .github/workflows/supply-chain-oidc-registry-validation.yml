name: YCSEC Supply Chain OIDC Registry Validation

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  validate-registry-push:
    runs-on: ubuntu-latest
    env:
      YCSEC_IMAGE_NAME: ycsec-supply-chain-demo
      YCSEC_REPOSITORY_DIR: supply-chain/demo-app

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate required variables
        shell: bash
        run: |
          set -euo pipefail
          test -n "${{ vars.YCSEC_YC_SA_ID }}"
          test -n "${{ vars.YCSEC_YC_FOLDER_ID }}"
          test -n "${{ vars.YCSEC_YCR_REGISTRY_ID }}"
          echo "YCSEC_MARKER_INPUT_VARIABLES_OK"

      - name: Validate runner tooling
        shell: bash
        run: |
          set -euo pipefail
          command -v curl
          command -v jq
          command -v docker
          docker version
          echo "YCSEC_MARKER_RUNNER_TOOLING_OK"

      - name: Request GitHub OIDC assertion
        shell: bash
        run: |
          set -euo pipefail
          AUDIENCE="https://github.com/${{ github.repository_owner }}"
          RESPONSE="$(
            curl -fsSL \
              -H "Authorization: bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" \
              "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=${AUDIENCE}"
          )"
          ASSERTION="$(printf '%s' "$RESPONSE" | jq -r '.value')"
          test -n "$ASSERTION"
          test "$ASSERTION" != "null"
          printf 'GITHUB_OIDC_ASSERTION=%s\n' "$ASSERTION" > "$RUNNER_TEMP/github-oidc.env"
          echo "YCSEC_MARKER_OIDC_ASSERTION_REQUESTED"

      - name: Exchange OIDC assertion for Yandex Cloud IAM token
        shell: bash
        run: |
          set -euo pipefail
          . "$RUNNER_TEMP/github-oidc.env"
          EXCHANGE_RESPONSE="$(
            curl -fsSL \
              -X POST "https://auth.yandex.cloud/oauth/token" \
              -H "Content-Type: application/x-www-form-urlencoded" \
              --data-urlencode "grant_type=urn:ietf:params:oauth:grant-type:token-exchange" \
              --data-urlencode "requested_token_type=urn:ietf:params:oauth:token-type:access_token" \
              --data-urlencode "audience=${{ vars.YCSEC_YC_SA_ID }}" \
              --data-urlencode "subject_token=${GITHUB_OIDC_ASSERTION}" \
              --data-urlencode "subject_token_type=urn:ietf:params:oauth:token-type:id_token"
          )"
          YC_IAM_TOKEN="$(printf '%s' "$EXCHANGE_RESPONSE" | jq -r '.access_token // .iam_token // empty')"
          test -n "$YC_IAM_TOKEN"
          printf 'YC_IAM_TOKEN=%s\n' "$YC_IAM_TOKEN" > "$RUNNER_TEMP/yc-iam.env"
          echo "YCSEC_MARKER_YC_IAM_TOKEN_EXCHANGED"

      - name: Validate Yandex Cloud API access
        shell: bash
        run: |
          set -euo pipefail
          . "$RUNNER_TEMP/yc-iam.env"
          curl -fsSL \
            -H "Authorization: Bearer ${YC_IAM_TOKEN}" \
            "https://resource-manager.api.cloud.yandex.net/resource-manager/v1/folders/${{ vars.YCSEC_YC_FOLDER_ID }}" \
            | jq -e '.id' >/dev/null
          echo "YCSEC_MARKER_CLOUD_API_ACCESS_OK"

      - name: Authenticate Docker to Yandex Container Registry
        shell: bash
        run: |
          set -euo pipefail
          . "$RUNNER_TEMP/yc-iam.env"
          printf '%s' "$YC_IAM_TOKEN" | docker login --username iam --password-stdin cr.yandex >/dev/null
          echo "YCSEC_MARKER_REGISTRY_AUTH_OK"

      - name: Build and push controlled demo images
        shell: bash
        run: |
          set -euo pipefail
          SHORT_SHA="${GITHUB_SHA::12}"
          IMAGE_BASE="cr.yandex/${{ vars.YCSEC_YCR_REGISTRY_ID }}/${YCSEC_IMAGE_NAME}"

          docker build --pull --progress=plain \
            -f "${YCSEC_REPOSITORY_DIR}/Dockerfile.insecure" \
            -t "${IMAGE_BASE}:insecure-${SHORT_SHA}" \
            -t "${IMAGE_BASE}:latest" \
            "${YCSEC_REPOSITORY_DIR}"

          docker image inspect "${IMAGE_BASE}:insecure-${SHORT_SHA}" >/dev/null
          docker push "${IMAGE_BASE}:insecure-${SHORT_SHA}"
          docker push "${IMAGE_BASE}:latest"

          docker build --pull --progress=plain \
            -f "${YCSEC_REPOSITORY_DIR}/Dockerfile.hardened" \
            -t "${IMAGE_BASE}:hardened-${SHORT_SHA}" \
            "${YCSEC_REPOSITORY_DIR}"

          docker image inspect "${IMAGE_BASE}:hardened-${SHORT_SHA}" >/dev/null
          docker push "${IMAGE_BASE}:hardened-${SHORT_SHA}"

          echo "YCSEC_MARKER_IMAGE_PUSH_OK"
          echo "YCSEC_IMAGE_INSECURE=${IMAGE_BASE}:insecure-${SHORT_SHA}"
          echo "YCSEC_IMAGE_MUTABLE=${IMAGE_BASE}:latest"
          echo "YCSEC_IMAGE_HARDENED=${IMAGE_BASE}:hardened-${SHORT_SHA}"

      - name: Confirm no durable cloud credential file was used
        shell: bash
        run: |
          set -euo pipefail
          FOUND="$(
            find "$GITHUB_WORKSPACE" -maxdepth 5 \
              \( -name "*.pem" -o -name "*authorized*.json" -o -name "*account*.json" \) \
              -print
          )"
          test -z "$FOUND"
          docker logout cr.yandex >/dev/null 2>&1 || true
          echo "YCSEC_MARKER_NO_DURABLE_CREDENTIAL_FILE"

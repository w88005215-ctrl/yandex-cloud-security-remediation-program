name: YCSEC Cloud Deploy OIDC Validation

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/cloud-deploy-oidc.yml"
      - "ci/github-oidc-validation-trigger.md"

permissions:
  contents: read
  id-token: write

jobs:
  validate-yandex-cloud-oidc:
    name: Validate GitHub OIDC to Yandex Cloud
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate repository variables
        shell: bash
        run: |
          set -euo pipefail
          test -n "${{ vars.YCSEC_YC_SA_ID }}"
          test -n "${{ vars.YCSEC_YC_FOLDER_ID }}"
          echo "[OK] required repository variables are present"

      - name: Obtain Yandex Cloud IAM token through GitHub OIDC
        id: yc-token
        uses: yandex-cloud/yc-github-actions/yc-iam-token-fed@v1
        with:
          yc-sa-id: ${{ vars.YCSEC_YC_SA_ID }}

      - name: Validate no static cloud credential is used
        shell: bash
        run: |
          set -euo pipefail
          test -n "${{ steps.yc-token.outputs.token }}"
          echo "[OK] GitHub Actions obtained a Yandex Cloud IAM token through OIDC"
          echo "[OK] workflow uses GitHub id-token permission"
          echo "[OK] workflow uses repository variables for scoped service account and folder"
          echo "[OK] no authorized key file is required"
          echo "[OK] no long-lived cloud key is stored in repository secrets"

      - name: Validate Yandex Cloud API access with short-lived token
        shell: bash
        env:
          YC_TOKEN: ${{ steps.yc-token.outputs.token }}
          YC_FOLDER_ID: ${{ vars.YCSEC_YC_FOLDER_ID }}
        run: |
          set -euo pipefail
          curl -fsS \
            -H "Authorization: Bearer ${YC_TOKEN}" \
            "https://resource-manager.api.cloud.yandex.net/resource-manager/v1/folders/${YC_FOLDER_ID}" \
            | python3 -m json.tool
          echo "[OK] Yandex Cloud Resource Manager API accepted the OIDC-derived IAM token"

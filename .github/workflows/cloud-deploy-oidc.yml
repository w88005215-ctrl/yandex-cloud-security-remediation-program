name: YCSEC Cloud OIDC Validation

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  validate-yandex-cloud-oidc:
    name: Validate Yandex Cloud access through GitHub OIDC
    runs-on: ubuntu-latest

    steps:
      - name: Issue Yandex Cloud IAM access through GitHub OIDC
        id: get-iam-token
        uses: docker://ghcr.io/yc-actions/yc-iam-token-fed:1.0.0
        with:
          yc-sa-id: ${{ vars.YCSEC_YC_SA_ID }}

      - name: Confirm Yandex Cloud API access without printing sensitive data
        env:
          YCSEC_IAM_ACCESS: ${{ steps.get-iam-token.outputs.token }}
          YCSEC_YC_FOLDER_ID: ${{ vars.YCSEC_YC_FOLDER_ID }}
        run: |
          set -euo pipefail

          if [ -z "${YCSEC_IAM_ACCESS}" ]; then
            echo "[FAIL] federated IAM access value is empty"
            exit 1
          fi

          echo "::add-mask::${YCSEC_IAM_ACCESS}"

          RESPONSE_FILE="$(mktemp)"
          HTTP_CODE="$(curl -sS -o "${RESPONSE_FILE}" -w "%{http_code}" \
            -H "Authorization: Bearer ${YCSEC_IAM_ACCESS}" \
            "https://resource-manager.api.cloud.yandex.net/resource-manager/v1/folders/${YCSEC_YC_FOLDER_ID}")"

          if [ "${HTTP_CODE}" != "200" ]; then
            echo "[FAIL] Yandex Cloud API request failed with HTTP ${HTTP_CODE}"
            cat "${RESPONSE_FILE}"
            exit 1
          fi

          python3 - "${RESPONSE_FILE}" <<'PY'
import json
import sys
from pathlib import Path

data = json.loads(Path(sys.argv[1]).read_text())
folder_id = data.get("id")
if not folder_id:
    print("[FAIL] folder metadata response does not contain folder id")
    raise SystemExit(1)

print("[OK] Yandex Cloud API request succeeded through federated identity")
print("[OK] Folder metadata was received without long-lived cloud key material")
PY

apiVersion: v1
kind: ServiceAccount
metadata:
  name: ycsec-app
  namespace: ycsec-remediated
  labels:
    app.kubernetes.io/name: ycsec-remediated-workload
    security.ycsec.io/control: rbac-least-privilege
automountServiceAccountToken: false
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ycsec-app-read-config
  namespace: ycsec-remediated
  labels:
    app.kubernetes.io/name: ycsec-remediated-workload
    security.ycsec.io/control: rbac-least-privilege
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ycsec-app-read-config
  namespace: ycsec-remediated
  labels:
    app.kubernetes.io/name: ycsec-remediated-workload
    security.ycsec.io/control: rbac-least-privilege
subjects:
  - kind: ServiceAccount
    name: ycsec-app
    namespace: ycsec-remediated
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: ycsec-app-read-config

apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: ycsec-require-resource-limits
  annotations:
    policies.kyverno.io/title: Require resource requests and limits
    policies.kyverno.io/category: Resource Management
spec:
  validationFailureAction: Audit
  background: true
  rules:
    - name: require-requests-and-limits
      match:
        any:
          - resources:
              kinds:
                - Pod
      validate:
        message: "Containers must define CPU and memory requests and limits."
        pattern:
          spec:
            containers:
              - name: "*"
                resources:
                  requests:
                    cpu: "?*"
                    memory: "?*"
                  limits:
                    cpu: "?*"
                    memory: "?*"
